<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Questions - Ask & Rate ❤️</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-elements">
        <div class="floating-heart heart-1">❤️</div>
        <div class="floating-heart heart-2">💕</div>
        <div class="floating-heart heart-3">💖</div>
        <div class="floating-heart heart-4">💝</div>
    </div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="title">
                    <span class="heart-icon">💕</span>
                    Love Questions
                    <span class="heart-icon">💕</span>
                </h1>
                <p class="subtitle">Ask questions and let me show you how well I know you</p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Question Section -->
            <section class="question-section">
                <div class="section-card">
                    <h2 class="section-title">
                        <i class="fas fa-heart"></i> Ask Me a Question
                    </h2>
                    <form id="questionForm" class="question-form">
                        <div class="form-group">
                            <input 
                                type="text" 
                                id="questionInput" 
                                placeholder="Ask me anything, babe... ✨" 
                                class="form-input"
                                required
                            >
                        </div>
                        <textarea 
                            id="answerInput" 
                            placeholder="Your answer here... 💭" 
                            class="form-textarea"
                            rows="4"
                        ></textarea>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-paper-plane"></i> Submit
                        </button>
                    </form>
                </div>
            </section>

            <!-- Questions & Answers Section -->
            <section class="qa-section">
                <div class="section-card">
                    <h2 class="section-title">
                        <i class="fas fa-comments"></i> Our Conversations
                    </h2>
                    
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="rated">Rated</button>
                        <button class="filter-btn" data-filter="unrated">Unrated</button>
                    </div>

                    <div id="qaContainer" class="qa-container">
                        <div class="empty-state">
                            <i class="fas fa-heart-broken"></i>
                            <p>No questions yet! Start a conversation 💕</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Stats Section -->
            <section class="stats-section">
                <div class="section-card">
                    <h2 class="section-title">
                        <i class="fas fa-chart-heart"></i> Our Stats
                    </h2>
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="stat-number" id="totalQuestions">0</div>
                            <div class="stat-label">Questions Asked</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-number" id="avgRating">0</div>
                            <div class="stat-label">Average Rating</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-number" id="bestRating">0</div>
                            <div class="stat-label">Best Rating</div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Made with <span class="heart-beat">❤️</span> for you</p>
            <button id="clearData" class="btn-clear">Clear All Data</button>
        </footer>
    </div>

    <!-- Modal for editing -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Edit Question & Answer</h2>
            <form id="editForm">
                <input type="hidden" id="editId">
                <input type="text" id="editQuestion" placeholder="Question" class="form-input">
                <textarea id="editAnswer" placeholder="Answer" class="form-textarea" rows="4"></textarea>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
